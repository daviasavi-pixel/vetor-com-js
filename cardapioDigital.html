<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Digital</title>

    <style>
        h1{font-style: italic;font-size: 50px;}

        body{text-align: center;font-family: 'Times New Roman', Times, serif;}

        .card{
            border: 1px solid black;margin: 5px auto;
            padding: 10px;
            width: 250px;
            margin-top: 20px;
            border-radius: 10px;
        }
    </style>

</head>
<body>
    <h1> 🍟 Cardápio Digital 🍟 </h1> <br>

    <input type="text" id="nome" placeholder="Nome do lanche ">
    <input type="number" id="preco" placeholder="Valor ">
    <input type="text" id="categoria" placeholder="Categoria ">
    <button onclick="adicionaritem()">Adicionar item</button>

    <div id="cardapio"></div>

    <script>
        let produtos = [
            {
                nome: "X-Burguer",
                preco:  "R$ 25.00",
                categoria: "Lanche"
            },
             {
                nome: "Pizza de Calabresa",
                preco: "R$ 110.00",
                categoria: "Lanche"
            }
        ];

        function listarProdutos(){
            let cardapio = document.getElementById("cardapio");

            cardapio.innerHTML = "";

            for(let i = 0; i < produtos.length; i++){
                cardapio.innerHTML += 
                "<div class='card'>" +
                    "<h2>" + produtos[i].nome + "</h2>" +
                    "<p>" + produtos[i].preco + "</p>"+
                    "<p>" + produtos[i].categoria + "</p>"+
                    "</div>"
            }
        }
        listarProdutos()

        function adicionaritem(){
            let nome = document.getElementById("nome").value = "";
            let preco = document.getElementById("preco").value = "";
            let categoria = document.getElementById("categoria").value = "";

            produtos.push({
                nome: nome,
                preco: preco,
                categoria: categoria
            });

            listarProdutos();
        }
    </script>
</body>
</html>
